<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Calculator</title>
    </head>
    <body>
        <div class="calculator">

            <section class="display">
                0
            </section>

            <section class="keyboard">

                <div class="row">
                    <button class="button">
                        C
                    </button>
                    <button class="button wide">
                        &#9003;
                    </button>
                    <button class="button operator">
                        &divide;
                    </button>
                </div>

                <div class="row">
                    <button class="button">
                        7
                    </button>
                    <button class="button">
                        8
                    </button>
                    <button class="button">
                        9
                    </button>
                    <button class="button operator">
                        &times;
                    </button>
                </div>
                
                <div class="row">
                    <button class="button">
                        4
                    </button>
                    <button class="button">
                        5
                    </button>
                    <button class="button">
                        6
                    </button>
                    <button class="button operator">
                        &minus;
                    </button>
                </div>

                <div class="row">
                    <button class="button">
                        1
                    </button>
                    <button class="button">
                        2
                    </button>
                    <button class="button">
                        3
                    </button>
                    <button class="button operator">
                        &plus;
                    </button>
                </div>

                <div class="row">
                    <button class="button wide">
                        0
                    </button>
                    <button class="button">
                        &comma;
                    </button>
                    <button class="button operator">
                        &equals;
                    </button>
                </div>

            </section>

        </div>

        <script src="script.js"></script>
    </body>
</html>
